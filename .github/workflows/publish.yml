name: Publish to npm & Build Desktop

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        continue-on-error: true
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        continue-on-error: true

  desktop:
    needs: publish
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: x64
            args: --mac --x64
          - os: macos-latest
            arch: arm64
            args: --mac --arm64
          - os: ubuntu-latest
            arch: x64
            args: --linux --x64
          - os: ubuntu-latest
            arch: arm64
            args: --linux --arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Build core library
        run: npm run build

      - name: Install desktop dependencies
        working-directory: packages/desktop-electron
        run: npm install

      - name: Download ML models
        working-directory: packages/desktop-electron
        run: npm run download-models

      - name: Install sandbox build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y meson ninja-build pkg-config libcap-dev

      - name: Install cross-compilation tools
        if: runner.os == 'Linux' && matrix.arch == 'arm64'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build and bundle sandbox binaries
        if: runner.os == 'Linux'
        working-directory: packages/desktop-electron
        run: node scripts/prepare-sandbox-bins.js

      - name: Sync version from root package.json
        shell: bash
        run: |
          ROOT_VERSION=$(node -p "require('./package.json').version")
          cd packages/desktop-electron
          node -e "const p=require('./package.json'); p.version='$ROOT_VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Copy core into desktop node_modules
        working-directory: packages/desktop-electron
        run: npm run prepackage

      - name: Build desktop app
        working-directory: packages/desktop-electron
        run: npm run build

      - name: Package & publish desktop binaries
        working-directory: packages/desktop-electron
        run: npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: GPG-sign RPM packages
        if: runner.os == 'Linux'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find RPMs built by electron-builder
          RPMS=$(find packages/desktop-electron/release packages/desktop-electron/dist -name '*.rpm' 2>/dev/null)
          if [ -z "$RPMS" ]; then
            echo "No RPMs found, skipping signing"
            exit 0
          fi

          sudo apt-get install -y rpm

          # Import GPG key
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long | grep '^sec' | head -1 | awk '{print $2}' | cut -d'/' -f2)

          # Configure rpmmacros for signing
          cat > ~/.rpmmacros << MACROS
          %_signature gpg
          %_gpg_name $GPG_KEY_ID
          %__gpg /usr/bin/gpg
          %__gpg_sign_cmd %{__gpg} gpg --batch --no-verbose --no-armor --pinentry-mode loopback --yes --no-secmem-warning -u "%{_gpg_name}" -sbo %{__signature_filename} --digest-algo sha256 %{__plaintext_filename}
          MACROS

          # Sign each RPM
          for rpm_file in $RPMS; do
            echo "Signing $rpm_file..."
            rpmsign --addsign "$rpm_file"
          done

          # Re-upload signed RPMs to the release (overwrite unsigned ones)
          TAG_NAME=${GITHUB_REF#refs/tags/}
          for rpm_file in $RPMS; do
            echo "Uploading signed $(basename "$rpm_file")..."
            gh release upload "$TAG_NAME" "$rpm_file" --clobber --repo "${{ github.repository }}"
          done
