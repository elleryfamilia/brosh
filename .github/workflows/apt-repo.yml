name: Update install scripts & RPM repo

on:
  workflow_run:
    workflows: ["Publish to npm & Build Desktop"]
    types: [completed]

jobs:
  update-repos:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: echo "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Get release tag
        id: tag
        env:
          RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          VERSION="${RUN_HEAD_BRANCH#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$RUN_HEAD_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Export public key
        run: gpg --armor --export > website/gpg.key

      - name: Generate install script
        run: |
          cat > website/install.sh << 'SCRIPT_EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          REPO="elleryfamilia/brosh"
          GPG_KEY_URL="https://bro.sh/gpg.key"

          # Detect architecture
          ARCH=$(uname -m)
          case "$ARCH" in
            amd64|x86_64) ARCH="amd64" ;;
            arm64|aarch64) ARCH="arm64" ;;
            *) echo "Error: unsupported architecture: $ARCH"; exit 1 ;;
          esac

          # Detect package manager / distro family
          if command -v dnf >/dev/null 2>&1; then
            PKG_TYPE="rpm"
          elif command -v apt >/dev/null 2>&1; then
            PKG_TYPE="deb"
          else
            echo "Error: unsupported system — neither apt nor dnf found"
            exit 1
          fi

          # Determine version (use argument, or fetch latest)
          if [ -n "${1:-}" ]; then
            VERSION="$1"
          else
            VERSION=$(curl -fsSL "https://api.github.com/repos/$REPO/releases/latest" | grep '"tag_name"' | head -1 | cut -d'"' -f4 | sed 's/^v//')
          fi

          echo "Installing brosh v${VERSION} for ${ARCH} (${PKG_TYPE})..."

          # Verify GPG signature if key is available
          if command -v gpg >/dev/null 2>&1; then
            curl -fsSL "$GPG_KEY_URL" | gpg --import --batch 2>/dev/null || true
          fi

          if [ "$PKG_TYPE" = "rpm" ]; then
            # Set up DNF repo for current and future updates
            sudo tee /etc/yum.repos.d/brosh.repo > /dev/null << 'REPO_EOF'
          [brosh]
          name=Brosh Terminal
          baseurl=https://bro.sh/rpm
          enabled=1
          gpgcheck=1
          gpgkey=https://bro.sh/gpg.key
          REPO_EOF
            sudo dnf install -y brosh-desktop
          else
            DEB_URL="https://github.com/$REPO/releases/download/v${VERSION}/brosh-desktop_${VERSION}_${ARCH}.deb"
            TMP_DEB=$(mktemp /tmp/brosh-XXXXXX.deb)
            curl -fSL "$DEB_URL" -o "$TMP_DEB"
            sudo apt install -y "$TMP_DEB"
            rm -f "$TMP_DEB"
          fi

          echo "brosh v${VERSION} installed successfully."
          SCRIPT_EOF
          chmod +x website/install.sh

      - name: Generate uninstall script
        run: |
          cat > website/uninstall.sh << 'SCRIPT_EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          echo "Removing brosh..."
          if command -v dnf >/dev/null 2>&1; then
            sudo dnf remove -y brosh-desktop 2>/dev/null || true
            sudo rm -f /etc/yum.repos.d/brosh.repo
          else
            sudo apt remove -y brosh-desktop 2>/dev/null || sudo dpkg -r brosh-desktop 2>/dev/null || true
          fi
          echo "brosh removed."
          SCRIPT_EOF
          chmod +x website/uninstall.sh

      - name: Sign install script
        run: gpg --batch --yes --armor --detach-sign -o website/install.sh.asc website/install.sh

      - name: Install createrepo
        run: sudo apt-get update && sudo apt-get install -y createrepo-c

      - name: Download RPMs from release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.tag.outputs.version }}
        run: |
          mkdir -p website/rpm
          # Remove old RPMs and repodata
          rm -f website/rpm/*.rpm
          rm -rf website/rpm/repodata
          # Download new RPMs
          gh release download "v${RELEASE_VERSION}" \
            --pattern "*.rpm" \
            --dir website/rpm \
            --repo "${{ github.repository }}" || echo "No RPM assets found"

      - name: Build RPM repo metadata
        run: |
          if ls website/rpm/*.rpm 1>/dev/null 2>&1; then
            createrepo_c website/rpm
            # Sign the repo metadata
            gpg --batch --yes --armor --detach-sign -o website/rpm/repodata/repomd.xml.asc website/rpm/repodata/repomd.xml
          else
            echo "No RPM files found, skipping repo creation"
          fi

      - name: Commit and push
        env:
          RELEASE_VERSION: ${{ steps.tag.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/
          git commit -m "Update install scripts and RPM repo for v$RELEASE_VERSION" || echo "No changes"
          git push origin main
